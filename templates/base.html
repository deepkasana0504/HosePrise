<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ABC Company - Housing Analysis{% endblock %}</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Plotly -->
    <script src="https://cdn.plot.ly/plotly-3.4.0.min.js"></script>
    <style>
        :root {
            --primary: #2C3E50;
            --secondary: #3498DB;
            --accent: #E74C3C;
            --success: #27AE60;
            --warning: #F39C12;
            --bg-light: #F8F9FA;
            --card-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: var(--bg-light);
            color: var(--primary);
        }
        /* Navbar */
        .navbar-custom {
            background: linear-gradient(135deg, var(--primary), #1a252f);
            padding: 0.8rem 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .navbar-custom .navbar-brand {
            color: #fff;
            font-weight: 700;
            font-size: 1.3rem;
        }
        .navbar-custom .nav-link {
            color: rgba(255,255,255,0.85);
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .navbar-custom .nav-link:hover,
        .navbar-custom .nav-link.active {
            color: #fff;
            background: rgba(255,255,255,0.12);
        }
        /* KPI Cards */
        .kpi-card {
            background: #fff;
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            box-shadow: var(--card-shadow);
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
            border-left: 4px solid var(--secondary);
        }
        .kpi-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.12);
        }
        .kpi-card .kpi-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
        }
        .kpi-card .kpi-label {
            font-size: 0.85rem;
            color: #6c757d;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 0.25rem;
        }
        .kpi-card .kpi-icon {
            font-size: 2rem;
            color: var(--secondary);
            margin-bottom: 0.5rem;
        }
        .kpi-card:nth-child(2) { border-left-color: var(--success); }
        .kpi-card:nth-child(2) .kpi-icon { color: var(--success); }
        .kpi-card:nth-child(3) { border-left-color: var(--warning); }
        .kpi-card:nth-child(3) .kpi-icon { color: var(--warning); }
        .kpi-card:nth-child(4) { border-left-color: var(--accent); }
        .kpi-card:nth-child(4) .kpi-icon { color: var(--accent); }
        .kpi-card:nth-child(5) { border-left-color: #9B59B6; }
        .kpi-card:nth-child(5) .kpi-icon { color: #9B59B6; }
        /* Chart Cards */
        .chart-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            padding: 1.25rem;
            margin-bottom: 1.5rem;
        }
        .chart-card .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid #eee;
        }
        .chart-card .chart-title {
            font-weight: 600;
            font-size: 1rem;
            color: var(--primary);
            margin: 0;
        }
        .chart-card .chart-subtitle {
            font-size: 0.8rem;
            color: #999;
        }
        /* Filter bar */
        .filter-bar {
            background: #fff;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
        }
        .filter-bar label {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--primary);
        }
        .filter-bar select {
            border-radius: 8px;
            border: 1px solid #ddd;
            padding: 0.4rem 0.75rem;
            font-size: 0.85rem;
        }
        /* Section Title */
        .section-title {
            font-weight: 700;
            font-size: 1.15rem;
            color: var(--primary);
            margin-bottom: 1rem;
            padding-left: 0.75rem;
            border-left: 3px solid var(--secondary);
        }
        /* Footer */
        .footer {
            background: var(--primary);
            color: rgba(255,255,255,0.7);
            padding: 1.5rem 0;
            text-align: center;
            font-size: 0.85rem;
            margin-top: 2rem;
        }
        /* Responsive tweaks */
        @media (max-width: 768px) {
            .kpi-card .kpi-value { font-size: 1.4rem; }
            .chart-card { padding: 0.75rem; }
        }
        /* Plotly container */
        .plotly-chart { width: 100%; min-height: 380px; }

        /* Story styles */
        .story-slide {
            display: none;
            animation: fadeIn 0.4s ease;
        }
        .story-slide.active { display: block; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .story-nav { text-align: center; margin: 1.5rem 0; }
        .story-nav .btn { margin: 0 0.25rem; }
        .story-indicator {
            display: inline-block;
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #ccc;
            margin: 0 4px;
            transition: background 0.3s;
        }
        .story-indicator.active { background: var(--secondary); }
        .story-narrative {
            background: linear-gradient(135deg, #f0f7ff, #fff);
            border-left: 4px solid var(--secondary);
            border-radius: 8px;
            padding: 1rem 1.25rem;
            margin-bottom: 1rem;
            font-size: 0.95rem;
            color: #444;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-custom sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="bi bi-house-door-fill me-2"></i>ABC Company
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <i class="bi bi-list text-white fs-4"></i>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">
                            <i class="bi bi-speedometer2 me-1"></i>Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/dashboard' %}active{% endif %}" href="/dashboard">
                            <i class="bi bi-grid-1x2-fill me-1"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/storyboard' %}active{% endif %}" href="/storyboard">
                            <i class="bi bi-book-fill me-1"></i>Storyboard
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <main class="container-fluid px-3 px-md-4 py-4">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p class="mb-0">&copy; 2026 ABC Company &mdash; Housing Market Analysis Dashboard &mdash; All rights reserved.</p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
